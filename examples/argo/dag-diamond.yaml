apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: dag-diamond
spec:
  entrypoint: diamond
  arguments:
    parameters:
      - name: greeting
        value: "hello"
  templates:
    - name: echo
      inputs:
        parameters:
          - name: message
      container:
        image: alpine:3.18
        command: [echo]
        args: ["{{inputs.parameters.message}}"]

    - name: diamond
      dag:
        tasks:
          - name: A
            template: echo
            arguments:
              parameters:
                - name: message
                  value: "{{workflow.parameters.greeting}} from A"
          - name: B
            template: echo
            dependencies: [A]
            arguments:
              parameters:
                - name: message
                  value: "B saw: {{tasks.A.outputs.result}}"
          - name: C
            template: echo
            dependencies: [A]
            arguments:
              parameters:
                - name: message
                  value: "C"
          - name: D
            template: echo
            dependencies: [B, C]
            arguments:
              parameters:
                - name: message
                  value: "D"
