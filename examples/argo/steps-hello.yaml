apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: steps-hello
spec:
  entrypoint: hello-hello-hello
  arguments:
    parameters:
      - name: name
        value: world
  templates:
    - name: hello-hello-hello
      steps:
        - - name: hello1
            template: print-message
            arguments:
              parameters:
                - name: message
                  value: "hello1: {{workflow.parameters.name}}"
        - - name: hello2a
            template: print-message
            arguments:
              parameters:
                - name: message
                  value: "hello2a"
          - name: hello2b
            template: print-message
            arguments:
              parameters:
                - name: message
                  value: "hello2b"

    - name: print-message
      inputs:
        parameters:
          - name: message
      container:
        image: busybox
        command: [echo]
        args: ["{{inputs.parameters.message}}"]
