name: Release

# Publishes to PyPI when a version tag (v*) is pushed.
#
# Auth is PyPI Trusted Publishing (OIDC) — no token stored in this repo.
# One-time setup on pypi.org: Account → Publishing → add a pending publisher
# for project "argo2prefect", repo "mthatt/argo-migration",
# workflow "release.yml", environment "pypi".
#
# Release procedure:
#   1. Update CHANGELOG.md and the version in pyproject.toml + __init__.py
#   2. git tag v<version> && git push origin v<version>

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv pip install -e ".[dev,generated]"
      - run: .venv/bin/python -m pytest

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Check tag matches package version
        run: |
          version=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
          if [ "v$version" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject version $version" >&2
            exit 1
          fi
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
